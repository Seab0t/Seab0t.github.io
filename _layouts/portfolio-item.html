---
layout: default
---
<style>
  /* ====== 全局极简代码 ====== */
  .portfolio-page-container {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Roboto, Arial, sans-serif;
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 25px;
    color: #1a1a1a;
  }
.sticky-project-header {
    position: sticky; 
    top: 0; 
    background-color: #ffffff; 
    z-index: 100;
    padding: 35px 0 20px 0; 
    /* 底部分割线颜色对齐您给出的 #e2e8f0 浅灰 */
    border-bottom: 1px solid #e2e8f0; 
  }
  
  .back-to-gallery {
    display: inline-flex; align-items: center; gap: 6px; font-size: 0.9rem;
    text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; /* 对齐基准灰蓝 */
    text-decoration: none !important; margin-bottom: 20px; transition: all 0.2s ease;
  }
  .back-to-gallery:hover { color: #1a4471; transform: translateX(-4px); }
  
  /* 项目大标题：降低字重，让它和整体的轻盈感保持一致 */
  .sticky-project-header h1 {
    font-size: 1.85rem; 
    font-weight: 500; 
    line-height: 1.3; 
    letter-spacing: -0.01em;
    margin: 0 0 25px 0; 
    color: #252525;
  }

  /* 核心对齐：Flex 布局 */
  .typography-meta-info { 
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
  }

/* 🎯 终极统一：左侧 Role 样式完全克隆 Back 按钮的字体微表情 */
  .meta-left-role {
    font-size: 0.9rem;          /* 严格对齐 Back 按钮的 0.9rem */
    font-weight: 500;           /* 统一为清秀中性的 500 字重，拒绝多余粗体 */
    color: #64748b;             /* 严格对齐基准灰蓝色 */
    text-transform: uppercase;  /* 核心：同步大写字母转换，让排版带有一种严谨规整感 */
    letter-spacing: 0.05em;     /* 核心：拉开字间距，带来精细的杂志呼吸感 */
  }
  
  /* 核心：将原本突兀的粗体削减为 500 字重，颜色微调为比周围略深的深灰 */
  .meta-left-role .role-value {
    font-weight: 500; 
    color: #1a4471;
    margin-left: 2px;
  }

  /* 右侧：超链接容器 */
  .meta-right-links {
    display: flex;
    gap: 25px; 
  }
  
.academic-action-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 1.05rem; 
    font-weight: 500;   /* 严格对齐 500 字重 */
    color: #64748b !important; /* 👈 强行抹去蓝黑色，全面对齐 #64748b */
    text-decoration: none !important;
    transition: color 0.2s;
  }
  /* 鼠标悬停时才显现标志性的蓝黑色，提供精致的交互反馈 */
  .academic-action-link:hover { 
    color: #1a4471 !important; 
    text-decoration: underline !important;
  }

  .portfolio-content-body { margin-top: 40px; font-size: 1.05rem; line-height: 1.7; }
  .portfolio-content-body h3 {
    font-size: 1.3rem; font-weight: 700; margin-top: 3rem; margin-bottom: 1rem; color: #000;
  }
  .portfolio-content-body img {
    margin: 2rem 0; width: 100%; height: auto; border-radius: 4px;
  }
  .action-buttons { display: flex; gap: 15px; margin-top: 4rem; margin-bottom: 4rem; }
  
  .btn-minimal {
    display: inline-flex; align-items: center; gap: 8px; padding: 0.7rem 1.4rem;
    border-radius: 4px; font-weight: 500; font-size: 1.05rem; text-decoration: none !important;
    transition: all 0.2s;
  }
  .btn-outline { background-color: #fff; color: #000 !important; border: 1px solid #ccc; }
  .btn-outline:hover { border-color: #000; }

  /* ====== 左图右文子项目列表专属 CSS ====== */
  .subproject-list {
    display: flex;
    flex-direction: column;
    gap: 40px; 
    margin-top: 2rem;
  }

  .subproject-row {
    display: flex;
    gap: 30px; 
    align-items: flex-start; 
  }

  .subproject-img-wrapper {
    flex: 0 0 32%;
    max-width: 300px;
  }

  .subproject-img-wrapper a {
    display: block;
    overflow: hidden; 
    border-radius: 4px;
    border: 1px solid #eaeaea; 
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
  }
  .subproject-img-wrapper img {
    margin: 0 !important; 
    width: 100%;
    display: block;
    border: none;
    transition: transform 0.3s ease; 
  }
  .subproject-img-wrapper a:hover img {
    transform: scale(1.03); 
  }

  .subproject-text-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    margin-top: -3px; 
  }

  .subproject-title {
    color: #1a4471; 
    font-size: 1.2rem; 
    font-weight: 600;
    margin: 0 0 6px 0;
    line-height: 1.4;
  }

  .subproject-title a {
    color: #1a4471; 
    text-decoration: none !important;
    transition: color 0.2s ease;
  }
  .subproject-title a:hover {
    color: #e74c3c; 
    text-decoration: underline !important;
  }

  .subproject-meta {
    font-size: 0.95rem; 
    color: #666;
    margin-bottom: 10px;
    font-style: italic; 
  }

  .subproject-desc {
    font-size: 1.05rem; 
    color: #333;
    line-height: 1.6;
    margin: 0;
    text-align: justify; 
  }

  @media (max-width: 768px) {
    .subproject-row {
      flex-direction: column;
      gap: 15px;
    }
    .subproject-img-wrapper {
      flex: 0 0 100%;
      max-width: 100%;
    }
  }
</style>

<div class="portfolio-page-container">
  <header class="sticky-project-header">
    <a href="{{ site.baseurl }}/" class="back-to-gallery">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Back to Portfolio
    </a>

    <h1>{{ page.title }}</h1>
    
<div class="typography-meta-info">
      <div class="meta-left-role">
        {% if page.project_role %}
          Role <span class="role-value">{{ page.project_role }}</span>
        {% endif %}
      </div>
      
      <div class="meta-right-links">
        {% if page.github_link %}
          <a href="{{ page.github_link }}" target="_blank" class="academic-action-link">
            <svg style="width:16px; height:16px; fill:currentColor; vertical-align: text-top;" viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.03-2.682-.103-.253-.447-1.27.098-2.646 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.376.202 2.394.1 2.646.64.699 1.026 1.591 1.026 2.682 0 3.841-2.337 4.687-4.565 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z"/></svg>
            GitHub
          </a>
        {% endif %}
        
        {% if page.project_link %}
          <a href="{{ page.project_link }}" target="_blank" class="academic-action-link">
            <svg style="width:16px; height:16px; fill:none; stroke:currentColor; stroke-width:2; vertical-align: text-top;" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/></svg>
            Website
          </a>
        {% endif %}
      </div>
    </div>
  </header>

  <article class="portfolio-content-body">
    
    {{ content }}

    <div class="action-buttons">
      {% if page.paper_link %}
      <a href="{{ page.paper_link }}" target="_blank" class="btn-minimal btn-outline">
        View Manuscript
      </a>
      {% endif %}
    </div>

  </article>
</div>
