<style>
  /* 1. 接管 body：强制满屏并设为弹性盒子 */
  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh; /* 最小高度为 100% 视口高度 */
    margin: 0 !important;
    padding: 0 !important;
  }

  /* 2. 核心魔法：让正文区域像弹簧一样撑开所有剩余空间 */
  .initial-content, #main {
    flex: 1 0 auto;
  }

  /* 3. 剥夺系统自带 Footer 的所有多余留白 */
  .page__footer {
    margin-top: auto !important; /* 关键：有剩余空间时，自动把它顶到最底下 */
    margin-bottom: 0 !important; /* 强制消除底部的神秘空白 */
    padding: 0 !important;
    width: 100%;
    flex-shrink: 0;
  }

  /* 自定义极简 Footer 样式 */
  .custom-minimal-footer {
    background-color: #f8f9fa;
    border-top: 1px solid #e9ecef;
    padding: 2rem 20px;
    width: 100%;
    box-sizing: border-box; /* 防止 padding 导致元素溢出产生滚动条/空白 */
  }

  .custom-minimal-footer-inner {
    max-width: 950px; 
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #6c757d; 
    font-size: 0.9rem;
  }

  .footer-contact-links {
    display: flex;
    gap: 25px; 
  }

  .footer-contact-links a {
    color: #6c757d;
    text-decoration: none;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color 0.2s ease;
  }

  .footer-contact-links a:hover {
    color: #2c3e50; 
  }

  .footer-svg-icon {
    width: 18px;
    height: 18px;
    fill: currentColor; 
  }

  @media (max-width: 600px) {
    .custom-minimal-footer-inner {
      flex-direction: column;
      gap: 15px;
    }
  }
</style>

<footer class="custom-minimal-footer">
  <div class="custom-minimal-footer-inner">
    
    <div>&copy; {{ site.time | date: '%Y' }} {{ site.author.name | default: site.title }} | New York University</div>
    
    <div class="footer-contact-links">
      
      {% if site.author.email %}
      <a href="mailto:{{ site.author.email }}" aria-label="Email">
        <svg class="footer-svg-icon" viewBox="0 0 24 24">
          <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
        </svg>
        Email
      </a>
      {% endif %}
      
      {% if site.author.github %}
      <a href="https://github.com/{{ site.author.github }}" target="_blank" aria-label="GitHub">
        <svg class="footer-svg-icon" viewBox="0 0 24 24">
          <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.03-2.682-.103-.253-.447-1.27.098-2.646 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.376.202 2.394.1 2.646.64.699 1.026 1.591 1.026 2.682 0 3.841-2.337 4.687-4.565 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z"/>
        </svg>
        GitHub
      </a>
      {% endif %}
      
    </div>
  </div>
</footer>
